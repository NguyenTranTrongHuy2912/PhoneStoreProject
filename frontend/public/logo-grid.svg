<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Hình vuông trên trái -->
    <rect x="3" y="3" width="7" height="7" rx="1.5" fill="#2563eb" />
    
    <!-- Hình vuông trên phải (opacity 0.8) -->
    <rect x="14" y="3" width="7" height="7" rx="1.5" fill="#2563eb" fill-opacity="0.8" />
    
    <!-- Hình vuông dưới trái (opacity 0.6) -->
    <rect x="14" y="14" width="7" height="7" rx="4" fill="#2563eb" />
    
    <!-- Hình tròn dưới phải (Điểm nhấn) -->
    <rect x="3" y="14" width="7" height="7" rx="1.5" fill="#2563eb" fill-opacity="0.6" />
</svg>
